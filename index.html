<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アポ管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Circle Recruitment Desk</p>
          <h1>アポ管理</h1>
          <p class="hero-copy">
            誰の担当の新入生がいつ来るかを、日付ベースでまとめて管理します。
          </p>
        </div>
        <section class="identity-panel">
          <label class="field">
            <span>現在の担当者</span>
            <select id="current-member-select"></select>
          </label>
          <form id="member-create-form" class="inline-form">
            <label class="field grow">
              <span>担当者名を追加</span>
              <input
                id="new-member-name"
                name="memberName"
                type="text"
                maxlength="40"
                placeholder="例: 田中 太郎"
                autocomplete="off"
              />
            </label>
            <button type="submit" class="secondary-btn">追加</button>
          </form>
          <p class="helper">
            ログインはありません。画面上で選択した名前が、自分として扱われます。
          </p>
        </section>
      </header>

      <nav class="top-nav" aria-label="Main views">
        <button class="nav-btn active" data-view="appointments">アポ管理</button>
        <button class="nav-btn" data-view="shifts">β シフト管理</button>
      </nav>

      <main>
        <section id="appointments-view" class="view active">
          <div class="content-grid">
            <section class="panel form-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Appointment Form</p>
                  <h2 id="appointment-form-title">新規アポ登録</h2>
                </div>
                <button id="appointment-cancel-btn" class="ghost-btn hidden" type="button">
                  編集をやめる
                </button>
              </div>

              <form id="appointment-form" class="stack-form">
                <input id="appointment-id" name="appointmentId" type="hidden" />
                <label class="field">
                  <span>相手名</span>
                  <input id="appointment-name" name="name" type="text" maxlength="60" required />
                </label>
                <label class="field">
                  <span>大学・学部</span>
                  <input
                    id="appointment-school"
                    name="schoolAffiliation"
                    type="text"
                    maxlength="80"
                    required
                  />
                </label>
                <label class="field">
                  <span>アポ日付</span>
                  <input id="appointment-date" name="appointmentDate" type="date" required />
                </label>
                <label class="field">
                  <span>担当者</span>
                  <select id="appointment-owner" name="ownerMemberId" required></select>
                </label>
                <label class="field">
                  <span>状態</span>
                  <input
                    id="appointment-status"
                    name="statusText"
                    type="text"
                    maxlength="50"
                    placeholder="例: 調整中"
                  />
                </label>
                <label class="field">
                  <span>評価 (1-100)</span>
                  <input
                    id="appointment-score"
                    name="score"
                    type="number"
                    min="1"
                    max="100"
                    inputmode="numeric"
                    placeholder="任意"
                  />
                </label>
                <label class="field">
                  <span>新入生特徴</span>
                  <textarea
                    id="appointment-traits"
                    name="traits"
                    rows="4"
                    maxlength="200"
                    placeholder="例: 映画好き、経済学部"
                  ></textarea>
                </label>
                <button type="submit" class="primary-btn">保存する</button>
              </form>
            </section>

            <section class="panel list-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Appointment Calendar</p>
                  <h2>日付ごとの一覧</h2>
                </div>
                <label class="field compact">
                  <span>名前検索</span>
                  <input
                    id="appointment-search"
                    type="search"
                    placeholder="相手名・大学・担当者で検索"
                  />
                </label>
              </div>
              <div id="appointments-summary" class="summary-strip"></div>
              <div id="appointments-list" class="date-groups"></div>
            </section>
          </div>
        </section>

        <section id="shifts-view" class="view">
          <div class="content-grid shift-grid">
            <section class="panel form-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Shift Input</p>
                  <h2>自分のシフトを入力</h2>
                </div>
              </div>

              <div class="month-tabs" id="shift-month-tabs"></div>
              <form id="shift-form" class="stack-form">
                <label class="field">
                  <span>日付</span>
                  <select id="shift-date-select"></select>
                </label>
                <label class="field">
                  <span>参加可否</span>
                  <select id="shift-availability-select"></select>
                </label>
                <button type="submit" class="primary-btn">シフトを保存</button>
              </form>
              <p class="helper">
                β機能です。自分の分だけ編集でき、未入力は別状態として保持されます。
              </p>
            </section>

            <section class="panel list-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Daily Availability</p>
                  <h2>日別の参加可能者</h2>
                </div>
                <label class="field compact">
                  <span>確認したい日</span>
                  <select id="shift-day-lookup"></select>
                </label>
              </div>
              <div id="shift-day-summary" class="summary-strip"></div>
              <div class="availability-columns">
                <section class="availability-card">
                  <h3>昼 (12:00-17:00)</h3>
                  <ul id="day-members-list" class="name-list"></ul>
                </section>
                <section class="availability-card">
                  <h3>夜 (17:00-22:00)</h3>
                  <ul id="night-members-list" class="name-list"></ul>
                </section>
              </div>
              <section class="availability-card muted-card">
                <h3>未入力の担当者</h3>
                <ul id="unset-members-list" class="name-list"></ul>
              </section>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="appointment-card-template">
      <article class="appointment-card">
        <div class="appointment-main">
          <div>
            <h3 class="appointment-name"></h3>
            <p class="appointment-school"></p>
          </div>
          <div class="badge-row">
            <span class="badge appointment-owner"></span>
            <span class="badge appointment-status"></span>
            <span class="badge appointment-score"></span>
          </div>
        </div>
        <p class="appointment-traits"></p>
        <div class="card-actions">
          <button type="button" class="ghost-btn edit-btn">編集</button>
          <button type="button" class="danger-btn delete-btn">削除</button>
        </div>
      </article>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
